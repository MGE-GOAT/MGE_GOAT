name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. quick successive pushes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings   # treat warnings as errors everywhere

jobs:
  check:
    name: fmt · clippy · build · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable + rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Caches ~/.cargo and target/ keyed on Cargo.lock — big speedup on reruns.
      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Build
        run: cargo build --locked --verbose

      # The 2 GPU/LSP integration tests are #[ignore]d (need a GPU / rust-analyzer),
      # so they're skipped here; the 62 unit/integration tests run.
      - name: Test
        run: cargo test --locked --verbose
